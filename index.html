<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Supermarket</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoA6V1YkKHIYVq3DK4lMZ6q1FZVx4VIhSAl6x9tZ5K4br9E" crossorigin="anonymous">
  </head>
  <body>
        
    <!-- ============ 1. MENÚ HORIZONTAL ============ -->
    <header class="main-navbar sticky-top">
      <div class="container simple-nav">
        <a class="navbar-brand brand-logo" href="#inicio">
          <i class="bi bi-basket3-fill me-2"></i>Just <span>Shop</span>
        </a>
        <ul class="simple-nav-links">
          <li><a href="#inicio" class="active">Inicio</a></li>
          <li><a href="#categorias">Categorías</a></li>
          <li><a href="#ofertas">Ofertas</a></li>
          <li><a href="#nosotros">Nosotros</a></li>
          <li><a href="#footer">Contacto</a></li>
        </ul>
        <div class="simple-nav-icons">
          <a href="#"><i class="bi bi-search"></i></a>
          <a href="#"><i class="bi bi-person"></i></a>
          <a href="#" class="position-relative">
            <i class="bi bi-cart3"></i>
            <span class="cart-badge">3</span>
          </a>
        </div>
      </div>
    </header>

    <!--Titulos para encabezado inicial (abajo de los botones)-->
    <h1 class="hero-title">Just<span>Shop</span></h1>
    <h2 class="hero-subtitle">Tu súper con las mejores ofertas</h2>

    <section class="seccion-destacados py-3">
      <div class="container">
        <!--Añadiendo imagenes junto a sus precios :)-->
        <div class="fila-productos">
          <div class="min-producto">
            <img src="img/fruta.jpg" alt="Fruta Fresca">
            <p class="min-precio">$3.20</p>
          </div>
          <div class="min-producto2">
            <img src="img/carne.jpg" alt="Carne Fresca">
            <p class="min-precio2">$4.60</p>
          </div>
          <div class="min-producto3">
            <img src="img/shampoo.jpg" alt="Shampoo">
            <p class="min-precio3">$5.99</p>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-ppK0eX/1N5lO2YgvmJjBfjX9wDFj1qT3HqR5zrjF4bbhYyGTJwB4hWqO5yBfV7Zt" crossorigin="anonymous"></script>
  </body>
</html>
